<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .wrapper { padding: 100px 20px; }
        .logo-img { height: 80px; margin-bottom: 20px; border-radius: 10px; }
        h1 { font-size: 3rem; color: #00d1ff; margin-bottom: 10px; }
        p { color: #888; font-size: 1.2rem; margin-bottom: 40px; }
        .btns { display: flex; justify-content: center; gap: 20px; }
        .btn { background: #00d1ff; color: #000; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; text-transform: uppercase; }
        .btn:hover { opacity: 0.8; }
        .btn-alt { background: transparent; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="logo1.jpg" alt="Logo" class="logo-img">
        <h1>NBX Protocol</h1>
        <p>The Future of Governance is here.</p>
        <div class="btns">
            <a href="https://nbx-governance.onrender.com" class="btn">Open Dashboard</a>
            <a href="https://github.com/nbx-protocol/nbx-protocol.github.io" class="btn btn-alt">Whitepaper</a>
        </div>
    </div>
</body>
</html>
