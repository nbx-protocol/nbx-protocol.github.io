<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1505 0%, #050505 100%); z-index: -1; }
        .navbar { background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; padding: 15px 0; }
        .logo-img { height: 45px; width: auto; }
        .navbar-brand { color: var(--gold) !important; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .hero { height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin-bottom: 20px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; border-radius: 30px; padding: 15px 35px; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-gold:hover { background: #fff; transform: translateY(-3px); }
        .btn-outline { border: 1px solid #333; color: #fff; border-radius: 30px; padding: 15px 35px; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.jpg" alt="NBX" class="logo-img" onerror="this.src='logo1.jpg'">
                <span class="ms-3 text-white">NBX PROTOCOL</span>
            </a>
        </div>
    </nav>
    <section class="hero">
        <div class="container">
            <h6 class="text-gold text-uppercase mb-3" style="letter-spacing: 7px;">Future of Finance</h6>
            <h1>DECENTRALIZED<br><span style="color:var(--gold)">GOVERNANCE HUB</span></h1>
            <p class="text-secondary mb-5">Trasparenza on-chain e monitoraggio real-time del protocollo.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="dashboard.html" class="btn-gold">OPEN DASHBOARD</a>
                <a href="whitepaper.pdf" class="btn-outline" target="_blank">WHITEPAPER</a>
            </div>
        </div>
    </section>
</body>
</html>
