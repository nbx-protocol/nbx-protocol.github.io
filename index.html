<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol | Institutional DAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --border: rgba(212, 175, 55, 0.2); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        .nav-logo { font-family: 'Orbitron'; color: var(--gold); font-weight: 700; text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; font-weight: 600; }
        .nav-links a:hover { color: var(--gold); }

        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; background: radial-gradient(circle at center, #1a1505 0%, #050505 100%); 
            padding-top: 80px;
        }
        
        .logo-panel {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            padding: 40px; border-radius: 40px; border: 1px solid var(--border);
            box-shadow: 0 0 60px rgba(0,0,0,0.8); margin-bottom: 30px;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .logo-central { width: 400px; max-width: 80%; height: auto; border-radius: 20px; }

        .hero h1 { font-family: 'Orbitron'; font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; margin: 10px 0; }
        .hero h1 span { color: var(--gold); }
        .hero p { color: #888; max-width: 600px; margin-bottom: 40px; font-size: 1rem; line-height: 1.6; padding: 0 20px; }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn-main { background: var(--gold); color: #000; padding: 16px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; font-family: 'Orbitron'; transition: 0.3s; font-size: 0.85rem; }
        .btn-sub { border: 1px solid #333; color: #fff; padding: 16px 35px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; font-size: 0.85rem; }
        .btn-sub:hover { border-color: var(--gold); color: var(--gold); }

        .ecosystem { padding: 80px 10%; background: #080808; }
        .eco-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .eco-card { background: var(--glass); border: 1px solid #1a1a1a; padding: 30px; border-radius: 20px; text-align: left; }
        .eco-card i { color: var(--gold); font-size: 2rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">NBX PROTOCOL</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="votes.html">Governance</a>
            <a href="whitepaper.pdf" target="_blank">Whitepaper</a>
        </div>
    </nav>

    <section class="hero">
        <div class="logo-panel">
            <img src="logo1.jpg" alt="NBX" class="logo-central">
        </div>
        <h6 style="color:var(--gold); letter-spacing: 8px; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 10px;">Waves Infrastructure Layer</h6>
        <h1>INSTITUTIONAL <span>DAO</span></h1>
        <p>Monitoraggio real-time e trasparenza on-chain. Gestione asset, treasury e votazioni decentralizzate powered by Waves blockchain infrastructure.</p>
        <div class="btn-group">
            <a href="dashboard.html" class="btn-main">LAUNCH APP</a>
            <a href="votes.html" class="btn-sub">GOVERNANCE</a>
            <a href="whitepaper.pdf" target="_blank" class="btn-sub"><i class="far fa-file-pdf"></i> WHITEPAPER</a>
        </div>
    </section>
</body>
</html>
