<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol | Decentralized Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d1ff;
            --bg: #030303;
            --card-bg: #0a0a0a;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Effetto luce soffusa sullo sfondo */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 209, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-img {
            height: 120px;
            width: 120px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            padding: 5px;
            background: #000;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--text);
        }

        p {
            font-size: 1rem;
            color: #888;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 209, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 209, 255, 0.5);
            background: #00b8e6;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 209, 255, 0.05);
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logo1.jpg" alt="NBX Logo" class="logo-img">
        </div>
        
        <h1>NBX PROTOCOL</h1>
        <p>Advanced Decentralized Governance</p>

        <div class="btn-group">
            <a href="https://nbx-governance.onrender.com" class="btn btn-primary">Open Dashboard</a>
            <a href="https://github.com/nbx-protocol/nbx-protocol.github.io" class="btn btn-secondary">Whitepaper</a>
        </div>

        <footer>
            &copy; 2026 NBX PROTOCOL | Built on Blockchain
        </footer>
    </div>

</body>
</html>
