<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBX Protocol | Institutional Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d9ff;
            --primary-dark: #009dff;
            --bg: #020408;
            --card: #07111d;
            --border: rgba(0,217,255,0.18);
            --text: #ffffff;
            --muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(0,217,255,0.10), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(0,80,255,0.12), transparent 35%),
                        #020408;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 92%;
            max-width: 650px;
            padding: 60px 45px;
            border-radius: 34px;
            background: linear-gradient(180deg, rgba(10,20,35,0.92), rgba(5,10,18,0.96));
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0,217,255,0.08), 0 30px 90px rgba(0,0,0,0.65);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .top-line {
            width: 80px;
            height: 3px;
            margin: 0 auto 35px auto;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            border-radius: 999px;
        }

        .logo-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 28px;
            border: 2px solid rgba(0,217,255,0.45);
            padding: 6px;
            background: #000;
            box-shadow: 0 0 45px rgba(0,217,255,0.20);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 4px;
            margin: 20px 0;
            color: #e6fbff;
            text-shadow: 0 0 18px rgba(0,217,255,0.30);
        }

        .subtitle {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--muted);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 15px;
            padding: 15px 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1rem;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s ease;
            text-transform: uppercase;
            display: block;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: #001018;
            box-shadow: 0 10px 25px rgba(0,217,255,0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,217,255,0.4);
        }

        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.10);
            color: #d8f8ff;
            background: rgba(255,255,255,0.02);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0,217,255,0.05);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #475569;
            font-family: 'Orbitron', sans-serif;
        }

        @media(max-width:768px){
            h1 { font-size: 2rem; }
            .container { padding: 40px 25px; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-line"></div>
        <div class="logo-wrapper">
            <img src="logo1.jpg" alt="NBX Logo" class="logo-img">
        </div>

        <h1>NBX PROTOCOL</h1>
        <p class="subtitle">
            Institutional-grade decentralized governance infrastructure powered by Waves blockchain architecture.
        </p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">DAO</div>
                <div class="stat-label">Governance</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">ON-CHAIN</div>
                <div class="stat-label">Treasury</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">LIVE</div>
                <div class="stat-label">Voting</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="dashboard.html" class="btn btn-primary">
                Open Governance Dashboard
            </a>

            <a href="whitepaper.pdf" class="btn btn-secondary" target="_blank">
                Open Whitepaper
            </a>
        </div>

        <div class="footer">
            © 2026 NBX PROTOCOL — DECENTRALIZED INFRASTRUCTURE
        </div>
    </div>
</body>
</html>
