<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol | Institutional DAO Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0e0e0e; --border: rgba(212, 175, 55, 0.2); --glass: rgba(255, 255, 255, 0.02); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* NAVBAR */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        .nav-logo { font-family: 'Orbitron'; color: var(--gold); font-weight: 700; text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; font-weight: 600; }
        .nav-links a:hover { color: var(--gold); }

        /* HERO & LOGO PREMIUM */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; background: radial-gradient(circle at center, #1a1505 0%, #050505 100%); padding-top: 80px;
        }
        .logo-panel {
            background: var(--glass); backdrop-filter: blur(25px); padding: 50px; border-radius: 40px;
            border: 1px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8);
            animation: float 6s ease-in-out infinite; margin-bottom: 30px;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .logo-img { width: 400px; max-width: 85%; height: auto; border-radius: 15px; }

        .hero h1 { font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; margin: 20px 0; letter-spacing: -1px; }
        .hero h1 span { color: var(--gold); text-shadow: 0 0 30px rgba(212,175,55,0.3); }

        /* Rimossa la descrizione p italiana qui per IMG 1 */

        .btn-group { display: flex; gap: 20px; }
        .btn-main { background: var(--gold); color: #000; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 800; font-family: 'Orbitron'; transition: 0.3s; font-size: 0.9rem; }
        .btn-main:hover { transform: scale(1.05); background: #fff; }
        .btn-sub { border: 1px solid #333; color: #fff; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; font-size: 0.9rem; }
        .btn-sub:hover { border-color: var(--gold); color: var(--gold); }

        /* FOOTER SOCIAL */
        footer { padding: 60px 10%; background: #000; border-top: 1px solid #111; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
        .social-links a { color: #555; text-decoration: none; font-family: 'Orbitron'; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; }
        .social-links a:hover { color: var(--gold); }
        .copy { color: #222; font-size: 0.7rem; font-family: 'Orbitron'; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">NBX PROTOCOL</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="votes.html">Governance</a>
            <a href="whitepaper.pdf" target="_blank">Whitepaper</a>
            <a href="https://github.com" target="_blank">GitHub</a>
        </div>
    </nav>

    <section class="hero">
        <div class="logo-panel">
            <img src="logo1.jpg" alt="NBX" class="logo-img">
        </div>
        <h6 style="color:var(--gold); letter-spacing: 10px; text-transform: uppercase; font-weight: 800; font-size: 0.7rem; margin-bottom: 10px;">Waves Infrastructure Layer</h6>
        <h1>THE <span>DAO</span> ENGINE</h1>
        <div class="btn-group">
            <a href="dashboard.html" class="btn-main">ENTER APP</a>
            <a href="whitepaper.pdf" target="_blank" class="btn-sub">WHITEPAPER</a>
        </div>
    </section>

    <footer>
        <div class="social-links">
            <a href="https://github.com" target="_blank">GITHUB</a>
            <a href="#">FACEBOOK</a>
            <a href="#">TELEGRAM</a>
            <a href="#">INSTAGRAM</a>
            <a href="#">TIKTOK</a>
        </div>
        <div class="copy">NBX PROTOCOL © 2026 | INSTITUTIONAL DAO</div>
    </footer>
</body>
</html>
