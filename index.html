<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBX Protocol</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@waves/waves-transactions/dist/waves-transactions.min.js"></script>
</head>

<body>

<div class="container">

<h1>NBX Governance</h1>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="wallet"></p>

<input id="title" placeholder="Proposal title">
<button onclick="createProposal()">Create Proposal</button>

<div id="proposals"></div>

<canvas id="chart"></canvas>

</div>

<script>

const API = "https://nbx-governance.onrender.com";

let user = null;
let chart = null;

// ===== WALLET =====

async function connectWallet() {
    const state = await window.WavesKeeper.publicState();
    user = state.account.address;
    document.getElementById("wallet").innerText = user;
}

// ===== CREATE =====

async function createProposal() {

    const title = document.getElementById("title").value;

    const res = await fetch(API + "/proposals", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            title,
            options: ["YES","NO"]
        })
    });

    const data = await res.json();
    alert("Created: " + data.id);

    loadProposals();
}

// ===== LOAD =====

async function loadProposals() {

    const res = await fetch(API + "/proposals");
    const data = await res.json();

    const container = document.getElementById("proposals");
    container.innerHTML = "";

    data.forEach(p => {

        const div = document.createElement("div");

        div.innerHTML = `
            <h3>${p.title}</h3>
            <button onclick="snapshot('${p.id}')">Snapshot</button>
            <button onclick="vote('${p.id}','YES')">YES</button>
            <button onclick="vote('${p.id}','NO')">NO</button>
            <button onclick="loadVotes('${p.id}')">Load Votes</button>
            <pre id="res-${p.id}"></pre>
        `;

        container.appendChild(div);
    });
}

// ===== SNAPSHOT =====

async function snapshot(id) {
    await fetch(API + "/snapshot/" + id, { method: "POST" });
    alert("Snapshot done");
}

// ===== VOTE =====

function vote(id, option) {

    const tx = {
        type: 4,
        recipient: "3PLvmYuuHscQhxpvXZBzwAXFeLV2nt3M24M",
        amount: 100000,
        attachment: btoa(`VOTE:${id}:${option}`),
        fee: 100000
    };

    window.WavesKeeper.signAndPublishTransaction(tx);
}

// ===== LOAD VOTES =====

async function loadVotes(id) {

    const res = await fetch(API + "/votes/" + id);
    const data = await res.json();

    document.getElementById("res-" + id).innerText = JSON.stringify(data, null, 2);

    updateChart(data);
}

// ===== CHART =====

function updateChart(data) {

    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: Object.keys(data),
            datasets: [{
                data: Object.values(data)
            }]
        }
    });
}

loadProposals();

</script>

</body>
</html>
