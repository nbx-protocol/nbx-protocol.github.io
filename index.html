<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBX Protocol | Institutional Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary:#00d9ff;
            --primary-dark:#009dff;
            --bg:#030712;
            --text:#ffffff;
            --muted:#94a3b8;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }

        body{
            font-family:'Inter',sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0,217,255,0.08), transparent 30%),
                var(--bg);
            color:var(--text);
            overflow-x:hidden;
        }

        /* HEADER: Logo spostato più in basso e centrato */
        .main-header {
            width: 100%;
            padding: 100px 20px 50px 20px; /* Aumentato il margine superiore */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* LOGO: Dimensioni massime forzate e stile migliorato */
        .big-logo-fix {
            width: 420px !important; 
            height: auto !important;
            max-width: 95%;
            object-fit: contain;
            border-radius: 40px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 60px rgba(0, 217, 255, 0.25);
            margin-bottom: 35px;
        }

        .protocol-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 8px;
            color: #f4fdff;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        /* HERO AREA */
        .hero{
            width:100%;
            display:flex;
            justify-content:center;
            padding:40px 8% 100px 8%;
        }

        .hero-grid{
            width:100%;
            max-width:1300px;
            display:grid;
            grid-template-columns:1.1fr 0.9fr;
            gap:60px;
            align-items:center;
        }

        .hero-title{
            font-family:'Orbitron',sans-serif;
            font-size:5rem;
            line-height:1.05;
            margin-bottom:30px;
        }

        .hero-title span{ color:var(--primary); }

        .hero-subtitle{
            color:var(--muted);
            line-height:1.9;
            font-size:1.1rem;
            margin-bottom:45px;
            max-width:600px;
        }

        /* BOTTONI */
        .btn-group{ display:flex; gap:20px; flex-wrap:wrap; }
        
        .btn{
            text-decoration:none;
            padding:20px 35px;
            border-radius:15px;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:1px;
            transition:0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary{
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color:#001018;
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.2);
        }

        .btn-secondary{
            border: 1px solid rgba(0, 217, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            color: #dffcff;
        }

        .btn:hover{
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        /* DASHBOARD PREVIEW */
        .dashboard-preview{
            background: rgba(10, 20, 35, 0.8);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 40px;
            padding: 45px;
            backdrop-filter: blur(10px);
        }

        .vote-card{
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .bar{
            width:100%;
            height:10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .fill{
            height:100%;
            background: var(--primary);
            border-radius: 10px;
        }

        @media(max-width:980px){
            .hero-grid{ grid-template-columns:1fr; text-align: center; }
            .hero-title{ font-size:3.5rem; }
            .btn-group{ justify-content: center; }
            .hero-subtitle{ margin: 0 auto 45px auto; }
            .big-logo-fix { width: 300px !important; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <img src="logo1.jpg" alt="NBX Logo" class="big-logo-fix">
        <div class="protocol-name">NBX PROTOCOL</div>
    </header>

    <section class="hero">
        <div class="hero-grid">
            <div class="hero-left">
                <h1 class="hero-title">Institutional <span>Governance</span></h1>
                <p class="hero-subtitle">
                    Infrastruttura decentralizzata per il coordinamento della tesoreria e la gestione trasparente delle votazioni on-chain.
                </p>
                
                <div class="btn-group">
                    <a href="dashboard.html" class="btn btn-primary">Open Dashboard</a>
                    
                    <a href="https://nbx-governance-api.onrender.com/votes" class="btn btn-secondary" target="_blank">
                        API / VOTES DATA
                    </a>
                    
                    <a href="whitepaper.pdf" class="btn btn-secondary" target="_blank">Whitepaper</a>
                </div>
            </div>

            <div class="dashboard-preview">
                <div class="vote-card">
                    <div style="display:flex; justify-content:space-between;"><span>GOVERNANCE</span><span>72%</span></div>
                    <div class="bar"><div class="fill" style="width:72%;"></div></div>
                </div>
                <div class="vote-card">
                    <div style="display:flex; justify-content:space-between;"><span>ANALYTICS</span><span>48%</span></div>
                    <div class="bar"><div class="fill" style="width:48%;"></div></div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
