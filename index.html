<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden; /* Mantiene il focus sulla Hero */
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1505 0%, #050505 100%);
            z-index: -1;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* LOGO: Ingrandito e corretto su logo1.jpg */
        .logo-central {
            width: 280px; /* Dimensione aumentata come da richiesta */
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            border-radius: 15px;
        }

        /* SCRITTA FUTURE OF FINANCE: Ingrandita */
        .tagline {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 10px; /* Spaziatura premium */
            font-weight: 800;
            font-size: 1.5rem; /* Decisamente più visibile */
            margin-bottom: 20px;
            display: block;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .hero h1 span { color: var(--gold); }

        .hero p {
            color: #888;
            font-size: 1.2rem;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .btn-group { display: flex; gap: 20px; }

        .btn-nbx {
            padding: 20px 50px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .btn-gold {
            background: var(--gold);
            color: #000;
            border: 2px solid var(--gold);
        }

        .btn-gold:hover {
            background: #fff;
            border-color: #fff;
            transform: scale(1.05);
        }

        .btn-outline {
            border: 2px solid #333;
            color: #fff;
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <section class="hero">
        <img src="logo1.jpg" alt="NBX Protocol" class="logo-central">

        <span class="tagline">Future of Finance</span>
        
        <h1>DECENTRALIZED<br><span>GOVERNANCE HUB</span></h1>
        
        <p>Monitoraggio real-time e trasparenza on-chain. Gestione asset e votazioni decentralizzate su rete Waves.</p>
        
        <div class="btn-group">
            <a href="dashboard.html" class="btn-nbx btn-gold">OPEN DASHBOARD</a>
            <a href="whitepaper.pdf" class="btn-nbx btn-outline" target="_blank">WHITEPAPER</a>
        </div>
    </section>
</body>
</html>
