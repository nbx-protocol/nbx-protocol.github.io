<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBX Protocol | Institutional Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary:#00d9ff;
            --primary-dark:#009dff;
            --bg:#030712;
            --card:#08111f;
            --card-2:#0d1728;
            --border:rgba(0,217,255,0.12);
            --text:#ffffff;
            --muted:#94a3b8;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }
        html{ scroll-behavior:smooth; }

        body{
            font-family:'Inter',sans-serif;
            background: radial-gradient(circle at top left, rgba(0,217,255,0.08), transparent 30%), radial-gradient(circle at bottom right, rgba(0,80,255,0.10), transparent 35%), var(--bg);
            color:var(--text);
            overflow-x:hidden;
        }

        .wrapper{ position:relative; z-index:1; }

        /* ================= MODIFICA NAVBAR PER CENTRARE IL LOGO ================= */
        .navbar{
            width:100%;
            padding: 40px 0; /* Aumentato lo spazio verticale */
            display:flex;
            flex-direction: column; /* Impila logo e testo verticalmente */
            justify-content: center; /* Centra orizzontalmente rispetto alla pagina */
            align-items:center; /* Centra gli elementi internamente */
            gap: 20px; /* Spazio tra logo e testo */
        }

        /* Testo "NBX PROTOCOL" sotto il logo */
        .nav-text{
            font-family:'Orbitron',sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #dffcff;
            text-transform: uppercase;
        }

        /* MODIFICA DIMENSIONI LOGO - MOLTO PIÙ GRANDE */
        .nav-logo img{
            width: 150px; /* Dimensione molto più grande, come da foto */
            height: 150px;
            border-radius: 30px; /* Angoli più morbidi per un logo grande */
            border: 2px solid rgba(0,217,255,0.4);
            box-shadow: 0 0 30px rgba(0,217,255,0.2); /* Effetto bagliore */
        }

        /* Rimuovi il vecchio status che non c'è nello screenshot target */
        .nav-status{ display: none; }

        /* ================= RESTO DEL CODICE INVARIATO ================= */
        .hero{ width:100%; min-height:88vh; display:flex; justify-content:center; align-items:center; padding:40px 8% 80px 8%; }
        .hero-grid{ width:100%; max-width:1300px; display:grid; grid-template-columns:1.1fr 0.9fr; gap:55px; align-items:center; }
        .hero-title{ font-family:'Orbitron',sans-serif; font-size:5rem; line-height:1.02; margin-bottom:28px; letter-spacing:2px; color:#f4fdff; }
        .hero-title span{ color:var(--primary); }
        .hero-subtitle{ color:var(--muted); line-height:1.9; font-size:1.08rem; max-width:640px; margin-bottom:42px; }
        .btn-group{ display:flex; flex-wrap:wrap; gap:18px; }
        .btn{ text-decoration:none; padding:18px 28px; border-radius:16px; font-size:0.92rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; transition:0.3s ease; display: inline-block; }
        .btn-primary{ background:linear-gradient(90deg, var(--primary), var(--primary-dark)); color:#001018; box-shadow:0 10px 35px rgba(0,217,255,0.22); }
        .btn-secondary{ border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.02); color:#dffcff; }
        .btn:hover{ transform:translateY(-3px); }
        .dashboard-preview{ background:linear-gradient(180deg, rgba(10,20,35,0.92), rgba(5,10,18,0.98)); border:1px solid var(--border); border-radius:30px; padding:35px; backdrop-filter:blur(12px); }
        .vote-card{ background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.05); border-radius:18px; padding:22px; margin-bottom:15px; }
        .bar{ width:100%; height:8px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,0.05); }
        .fill{ height:100%; border-radius:999px; background:linear-gradient(90deg, var(--primary), var(--primary-dark)); }
        @media(max-width:980px){ .hero-grid{ grid-template-columns:1fr; } .hero-title{ font-size:3rem; } .btn-group{ flex-direction:column; } }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="navbar">
            <div class="nav-logo">
                <img src="logo1.jpg" alt="NBX Logo Large">
            </div>
            <div class="nav-text">NBX PROTOCOL</div>
        </div>

        <section class="hero">
            <div class="hero-grid">
                <div class="hero-left">
                    <h1 class="hero-title">Institutional <span>Governance</span></h1>
                    <p class="hero-subtitle">Decentralized treasury coordination and transparent governance infrastructure powered by Waves blockchain architecture.</p>
                    
                    <div class="btn-group">
                        <a href="dashboard.html" class="btn btn-primary">Open Dashboard</a>
                        <a href="https://nbx-governance-api.onrender.com/votes" class="btn btn-secondary" target="_blank">
                            API / VOTES DATA
                        </a>
                        <a href="whitepaper.pdf" class="btn btn-secondary" target="_blank">Whitepaper</a>
                    </div>
                </div>

                <div class="dashboard-preview">
                    <div class="vote-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>GOVERNANCE</span><span>72%</span></div>
                        <div class="bar"><div class="fill" style="width:72%;"></div></div>
                    </div>
                    <div class="vote-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>ANALYTICS</span><span>48%</span></div>
                        <div class="bar"><div class="fill" style="width:48%;"></div></div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
