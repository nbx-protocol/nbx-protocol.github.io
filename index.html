<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Protocol - Governance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --nbx-gold: #d4af37;
            --nbx-dark: #0a0a0a;
            --nbx-card: #141414;
        }
        body { 
            background-color: var(--nbx-dark); 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar { border-bottom: 1px solid #333; background-color: var(--nbx-card); }
        .card { 
            background-color: var(--nbx-card); 
            border: 1px solid #333; 
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--nbx-gold); }
        .vote-count { font-size: 2.5rem; font-weight: bold; color: var(--nbx-gold); }
        .btn-nbx { 
            background-color: var(--nbx-gold); 
            color: #000; 
            font-weight: bold; 
            border: none;
        }
        .btn-nbx:hover { background-color: #b8962d; color: #000; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <span class="navbar-brand mb-0 h1 text-gold">NBX PROTOCOL</span>
        <div class="d-flex align-items-center">
            <span class="status-dot bg-success me-2"></span>
            <small class="text-muted">SERVER LIVE</small>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">Governance Dashboard</h1>
        <p class="text-muted text-uppercase tracking-widest">Monitoraggio Voti in Tempo Reale</p>
    </div>

    <div class="row text-center g-4">
        <div class="col-md-4">
            <div class="card p-4">
                <h3>GOVERNANCE</h3>
                <div id="gov-votes" class="vote-count">--</div>
                <p class="text-muted">Peso Totale NBX</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h3>ANALYTICS</h3>
                <div id="ana-votes" class="vote-count">--</div>
                <p class="text-muted">Peso Totale NBX</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h3>GROWTH</h3>
                <div id="gro-votes" class="vote-count">--</div>
                <p class="text-muted">Peso Totale NBX</p>
            </div>
        </div>
    </div>

    <div class="mt-5 text-center">
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a href="votes.html" class="btn btn-secondary btn-lg px-5">
                API / VOTES DATA
            </a>
            <button onclick="updateVotes()" class="btn btn-nbx btn-lg px-5">
                AGGIORNA DATI
            </button>
        </div>
        <p class="mt-4"><a href="https://nbx-protocol.com" class="text-gold text-decoration-none">← Torna al sito principale</a></p>
    </div>
</div>

<script>
    async function updateVotes() {
        const govEl = document.getElementById('gov-votes');
        const anaEl = document.getElementById('ana-votes');
        const groEl = document.getElementById('gro-votes');

        try {
            // URL della tua API su Render
            const response = await fetch('https://nbx-governance-api.onrender.com/votes');
            const data = await response.json();

            govEl.innerText = data.GOVERNANCE || 0;
            anaEl.innerText = data.ANALYTICS || 0;
            groEl.innerText = data.GROWTH || 0;
        } catch (error) {
            console.error("Errore caricamento dati:", error);
            govEl.innerText = "!";
            anaEl.innerText = "!";
            groEl.innerText = "!";
        }
    }

    // Aggiorna al caricamento della pagina
    updateVotes();
    // Aggiorna ogni 60 secondi
    setInterval(updateVotes, 60000);
</script>

</body>
</html>
