<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX | Real-Time Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --border: rgba(212, 175, 55, 0.4); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        .header { padding: 80px 5% 40px; text-align: center; border-bottom: 1px solid var(--border); }
        .container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        
        /* BOX MONITORING - CONTRASTO ELEVATO */
        .monitor-card { background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 12px; margin-bottom: 30px; }
        .label { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.8rem; color: #fff; margin-bottom: 20px; letter-spacing: 2px; }
        
        .bar-bg { background: #000; height: 10px; border-radius: 5px; border: 1px solid #1a1a1a; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--gold); transition: width 2s ease-in-out; }
        
        /* TESTO META - ORA VISIBILE */
        .meta { margin-top: 18px; font-family: 'JetBrains Mono'; font-size: 0.8rem; color: #aaa; }
        .highlight { color: var(--gold); font-weight: bold; }

        .footer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
        .stat-box { background: #000; padding: 25px; border: 1px solid #111; border-radius: 8px; text-align: center; }
        .stat-box small { display: block; font-family: 'Orbitron'; font-size: 0.55rem; color: #555; margin-bottom: 10px; letter-spacing: 1px; }
        .stat-box span { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--gold); font-weight: 700; }

        /* EXIT BUTTON - CONTRASTO ELEVATO */
        .exit-btn { 
            display: block; width: fit-content; margin: 80px auto; padding: 18px 50px;
            color: #fff; text-decoration: none; font-family: 'Orbitron'; font-size: 0.75rem; 
            letter-spacing: 4px; border: 1px solid #333; border-radius: 4px; transition: 0.3s;
            background: #000; font-weight: 700;
        }
        .exit-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-family:'Orbitron'; font-size:0.6rem; color:var(--gold); letter-spacing:4px; margin-bottom:10px;">SYSTEM_STATUS: ACTIVE</div>
        <h1 style="font-family:'Orbitron'; letter-spacing:10px; margin:0; font-size: 2rem;">GOVERNANCE MONITOR</h1>
    </div>

    <div class="container">
        <div class="monitor-card">
            <div class="label"><span>GOVERNANCE_SYNC_WEIGHT</span><span id="p1" style="color:var(--gold)">0%</span></div>
            <div class="bar-bg"><div id="b1" class="bar-fill"></div></div>
            <div class="meta">BLOCKCHAIN SYNC // WEIGHT: <span id="v1" class="highlight">0.00</span> WX</div>
        </div>

        <div class="monitor-card">
            <div class="label"><span>API_CONSENSUS_LEVEL</span><span id="p2" style="color:var(--gold)">0%</span></div>
            <div class="bar-bg"><div id="b2" class="bar-fill"></div></div>
            <div class="meta">INDEXER STATUS // WEIGHT: <span id="v2" class="highlight">0.00</span> WX</div>
        </div>

        <div class="footer-grid">
            <div class="stat-box"><small>TREASURY</small><span>3P4k...8s9W</span></div>
            <div class="stat-box"><small>NODE</small><span style="color:#00ff00;">ONLINE</span></div>
            <div class="stat-box"><small>UPTIME</small><span>99.98%</span></div>
        </div>

        <a href="index.html" class="exit-btn">← EXIT MONITOR</a>
    </div>

    <script>
        async function fetchVotes() {
            try {
                const r = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
                const d = await r.json();
                const g = parseFloat(d.GOVERNANCE || 0);
                const a = parseFloat(d.ANALYTICS || 0);

                document.getElementById('b1').style.width = Math.min(g*100, 100) + "%";
                document.getElementById('p1').innerText = (g*100).toFixed(1) + "%";
                document.getElementById('v1').innerText = g.toFixed(2);
                
                document.getElementById('b2').style.width = Math.min(a*100, 100) + "%";
                document.getElementById('p2').innerText = (a*100).toFixed(1) + "%";
                document.getElementById('v2').innerText = a.toFixed(2);
            } catch(e) { console.log("Sync..."); }
        }
        setInterval(fetchVotes, 10000); fetchVotes();
    </script>
</body>
</html>
