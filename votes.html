<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governance Dashboard | NBX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0e0e0e; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px; box-sizing: border-box; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--gold); margin: 0; letter-spacing: 2px; }
        
        .api-status-tag {
            display: inline-flex; align-items: center; background: rgba(255,255,255,0.03);
            padding: 8px 20px; border-radius: 50px; border: 1px solid #222;
            margin-top: 20px; font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; transition: 0.3s; }
        .online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .offline { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

        .vote-card {
            background: var(--card); border: 1px solid var(--border); padding: 45px;
            border-radius: 30px; margin-bottom: 30px; position: relative; overflow: hidden;
            transition: 0.4s;
        }
        .vote-card:hover { border-color: var(--gold); box-shadow: 0 0 30px rgba(212,175,55,0.1); }
        
        .vote-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .vote-label h2 { font-family: 'Orbitron'; font-size: 1.1rem; margin: 0; letter-spacing: 1px; color: #fff; }
        .vote-label span { color: #444; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .perc-val { font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: var(--gold); }

        .progress-bar { background: #000; height: 14px; border-radius: 7px; border: 1px solid #222; overflow: hidden; margin-bottom: 25px; }
        .progress-fill { 
            height: 100%; width: 0%; background: linear-gradient(90deg, #8a6d1d, var(--gold)); 
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1); 
            box-shadow: 0 0 15px rgba(212,175,55,0.3);
        }

        .stats-row { display: flex; justify-content: space-between; padding-top: 20px; border-top: 1px solid #1a1a1a; }
        .stat-box { text-align: left; }
        .stat-box label { display: block; font-size: 0.6rem; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .stat-box span { font-family: 'Orbitron'; color: #eee; font-size: 1rem; }

        .back-home { display: block; text-align: center; margin-top: 50px; color: #333; text-decoration: none; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s; }
        .back-home:hover { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GOVERNANCE MONITOR</h1>
        <div class="api-status-tag">
            <div id="dot" class="status-dot"></div>
            API STATUS: <span id="status-text">CHECKING...</span>
        </div>
    </header>

    <div class="vote-card">
        <div class="vote-info">
            <div class="vote-label">
                <span>Core Proposal #001</span>
                <h2>GOVERNANCE ALLOCATION</h2>
            </div>
            <div class="perc-val" id="gov-p">0.0%</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="gov-f"></div></div>
        <div class="stats-row">
            <div class="stat-box"><label>Total Weight</label><span id="gov-v">0.00</span> WX</div>
            <div class="stat-box" style="text-align:right;"><label>Status</label><span style="color:#00ff00">ACTIVE</span></div>
        </div>
    </div>

    <div class="vote-card">
        <div class="vote-info">
            <div class="vote-label">
                <span>Core Proposal #002</span>
                <h2>ANALYTICS LAYER SYNC</h2>
            </div>
            <div class="perc-val" id="ana-p">0.0%</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="ana-f"></div></div>
        <div class="stats-row">
            <div class="stat-box"><label>Total Weight</label><span id="ana-v">0.00</span> WX</div>
            <div class="stat-box" style="text-align:right;"><label>Status</label><span style="color:#00ff00">ACTIVE</span></div>
        </div>
    </div>

    <a href="index.html" class="back-home">← BACK TO CORE LAYER</a>
</div>

<script>
    async function updateDashboard() {
        const dot = document.getElementById('dot');
        const statusTxt = document.getElementById('status-text');

        try {
            const r = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
            const d = await r.json();

            const gov = parseFloat(d.GOVERNANCE || 0);
            const ana = parseFloat(d.ANALYTICS || 0);

            // Calcolo percentuali basate su un target di 1000 WX per visualizzazione barra
            const gp = Math.min((gov / 10).toFixed(1), 100);
            const ap = Math.min((ana / 10).toFixed(1), 100);

            document.getElementById('gov-v').innerText = gov.toFixed(2);
            document.getElementById('gov-p').innerText = gp + "%";
            document.getElementById('gov-f').style.width = gp + "%";

            document.getElementById('ana-v').innerText = ana.toFixed(2);
            document.getElementById('ana-p').innerText = ap + "%";
            document.getElementById('ana-f').style.width = ap + "%";

            dot.className = "status-dot online";
            statusTxt.innerText = "ONLINE";
        } catch (e) {
            dot.className = "status-dot offline";
            statusTxt.innerText = "OFFLINE";
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 15000); // REFRESH 15 SEC
</script>

</body>
</html>
