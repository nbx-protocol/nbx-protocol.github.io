<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX | Governance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }

        .dash-header {
            padding: 70px 5% 40px; text-align: center;
            background: linear-gradient(to bottom, #111 0%, #050505 100%);
            border-bottom: 1px solid var(--border);
        }
        .api-status {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0,255,0,0.03); padding: 7px 18px; border-radius: 50px;
            border: 1px solid rgba(0,255,0,0.15); color: #00ff00; font-size: 0.6rem; 
            font-weight: 900; font-family: 'Orbitron'; letter-spacing: 2px;
        }
        .pulse { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .container { max-width: 950px; margin: 40px auto; padding: 0 25px; }
        
        .vote-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 25px;
            padding: 40px; margin-bottom: 30px; transition: 0.3s ease;
        }
        .vote-card:hover { border-color: var(--gold); transform: translateY(-3px); }

        .bar-label { display: flex; justify-content: space-between; margin-bottom: 15px; font-family: 'Orbitron'; font-size: 0.85rem; }
        .bar-outer { background: #000; height: 12px; border-radius: 50px; border: 1px solid #222; overflow: hidden; }
        .bar-inner { height: 100%; width: 0%; background: linear-gradient(90deg, #8a6d1d, var(--gold)); transition: width 2s cubic-bezier(0.4, 0, 0.2, 1); }

        .vote-card p { margin-top:15px; font-size:0.7rem; font-weight:500; color:#444; font-family:'Orbitron'; letter-spacing: 1px; }

        .infra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 40px; }
        .infra-item { background: #080808; border: 1px solid #151515; padding: 20px; border-radius: 12px; font-size: 0.6rem; color: #444; }
        .infra-item b { color: var(--gold); display: block; margin-top: 5px; font-family: 'Orbitron'; font-size: 0.7rem; }

        .back-btn { display: inline-block; margin-top: 40px; color: #444; text-decoration: none; font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 3px; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="dash-header">
        <div class="api-status"><span class="pulse"></span> CONNECTED</div>
        <h1 style="font-family:'Orbitron'; font-size:2rem; letter-spacing:5px; margin: 20px 0 10px;">GOVERNANCE HUB</h1>
        <p style="color:#555; font-size:0.75rem; font-weight:700; letter-spacing:2px;">NBX MONITORING</p>
    </div>

    <div class="container">
        <div class="vote-card">
            <div class="bar-label"><span>TREASURY GOVERNANCE NBX-01</span><span id="v1-perc" style="color:var(--gold)">0%</span></div>
            <div class="bar-outer"><div id="v1-bar" class="bar-inner"></div></div>
            <p>SYNCED // WEIGHT: <span id="v1-val" style="color:#888">0.00</span> WX</p>
        </div>

        <div class="vote-card">
            <div class="bar-label"><span>API LAYER CONSENSUS NBX-02</span><span id="v2-perc" style="color:var(--gold)">0%</span></div>
            <div class="bar-outer"><div id="v2-bar" class="bar-inner"></div></div>
            <p>DISTRIBUTED // WEIGHT: <span id="v2-val" style="color:#888">0.00</span> WX</p>
        </div>

        <div class="infra-grid">
            <div class="infra-item">TREASURY <b>3P4k...8s9W</b></div>
            <div class="infra-item">NODE <b>ACTIVE</b></div>
            <div class="infra-item">UPTIME <b>99.98%</b></div>
        </div>

        <div style="text-align: center;"><a href="index.html" class="back-btn">← EXIT MONITOR</a></div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
                const data = await response.json();
                const val1 = parseFloat(data.GOVERNANCE || 0);
                const val2 = parseFloat(data.ANALYTICS || 0);
                const p1 = Math.min((val1 / 10).toFixed(1), 100);
                const p2 = Math.min((val2 / 5).toFixed(1), 100);
                document.getElementById('v1-bar').style.width = p1 + "%";
                document.getElementById('v1-perc').innerText = p1 + "%";
                document.getElementById('v1-val').innerText = val1.toFixed(2);
                document.getElementById('v2-bar').style.width = p2 + "%";
                document.getElementById('v2-perc').innerText = p2 + "%";
                document.getElementById('v2-val').innerText = val2.toFixed(2);
            } catch(e) { console.warn("Sync Lag"); }
        }
        updateDashboard();
        setInterval(updateDashboard, 15000);
    </script>
</body>
</html>
