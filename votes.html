<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX | Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --border: rgba(212, 175, 55, 0.4); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        .header { padding: 60px 5% 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .monitor-card { background: #0a0a0a; border: 1px solid #333; padding: 30px; border-radius: 10px; margin-bottom: 20px; }
        .label { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.8rem; color: #fff; margin-bottom: 15px; }
        
        .bar-bg { background: #000; height: 10px; border-radius: 5px; border: 1px solid #222; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--gold); transition: width 2s ease; }
        
        /* FIX: Colore scritte meta da grigio scuro a BIANCO/ORO per visibilità */
        .meta { margin-top: 15px; font-family: 'JetBrains Mono'; font-size: 0.8rem; color: #ffffff; }
        .val { color: var(--gold); font-weight: bold; }

        /* EXIT BUTTON FIX: Da blu a ORO */
        .exit-btn { 
            display: block; width: fit-content; margin: 50px auto; padding: 15px 40px;
            color: var(--gold); text-decoration: none; font-family: 'Orbitron'; font-size: 0.75rem; 
            letter-spacing: 3px; border: 2px solid var(--gold); border-radius: 4px; transition: 0.3s;
            font-weight: bold; background: transparent;
        }
        .exit-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-family:'Orbitron'; letter-spacing:8px; margin:0; font-size: 1.6rem; color:#fff;">GOVERNANCE HUB</h1>
        <div style="font-family:'Orbitron'; font-size:0.6rem; color:var(--gold); margin-top:10px;">NBX MONITORING SYSTEM</div>
    </div>

    <div class="container">
        <div class="monitor-card">
            <div class="label"><span>TREASURY_SYNC</span><span id="p1" style="color:var(--gold)">0%</span></div>
            <div class="bar-bg"><div id="b1" class="bar-fill"></div></div>
            <div class="meta">SYNCED // WEIGHT: <span id="v1" class="val">0.00</span> WX</div>
        </div>

        <div class="monitor-card">
            <div class="label"><span>API_CONSENSUS</span><span id="p2" style="color:var(--gold)">0%</span></div>
            <div class="bar-bg"><div id="b2" class="bar-fill"></div></div>
            <div class="meta">DISTRIBUTED // WEIGHT: <span id="v2" class="val">0.00</span> WX</div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">
            <div style="background:#0a0a0a; padding:15px; border:1px solid #222; text-align:center;">
                <small style="color:#666; display:block; font-size:0.5rem; font-family:'Orbitron';">TREASURY</small>
                <span style="color:var(--gold); font-size:0.7rem; font-family:'JetBrains Mono';">3P4k...8s9W</span>
            </div>
            <div style="background:#0a0a0a; padding:15px; border:1px solid #222; text-align:center;">
                <small style="color:#666; display:block; font-size:0.5rem; font-family:'Orbitron';">NODE</small>
                <span style="color:#00ff00; font-size:0.7rem; font-family:'JetBrains Mono';">ACTIVE</span>
            </div>
            <div style="background:#0a0a0a; padding:15px; border:1px solid #222; text-align:center;">
                <small style="color:#666; display:block; font-size:0.5rem; font-family:'Orbitron';">UPTIME</small>
                <span style="color:var(--gold); font-size:0.7rem; font-family:'JetBrains Mono';">99.98%</span>
            </div>
        </div>

        <a href="index.html" class="exit-btn">← EXIT MONITOR</a>
    </div>

    <script>
        async function up() {
            try {
                const r = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
                const d = await r.json();
                const g = parseFloat(d.GOVERNANCE || 0);
                const a = parseFloat(d.ANALYTICS || 0);
                document.getElementById('b1').style.width = (g*100) + "%";
                document.getElementById('p1').innerText = (g*100).toFixed(1) + "%";
                document.getElementById('v1').innerText = g.toFixed(2);
                document.getElementById('b2').style.width = (a*100) + "%";
                document.getElementById('p2').innerText = (a*100).toFixed(1) + "%";
                document.getElementById('v2').innerText = a.toFixed(2);
            } catch(e) {}
        }
        setInterval(up, 10000); up();
    </script>
</body>
</html>
