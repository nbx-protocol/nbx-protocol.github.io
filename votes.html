<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Governance Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#00d9ff;
            --primary-dark:#009dff;
            --bg:#030712;
            --card:#08111f;
            --border:rgba(0,217,255,0.15);
            --text:#ffffff;
            --muted:#94a3b8;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0,217,255,0.08), transparent 30%),
                radial-gradient(circle at bottom right, rgba(0,80,255,0.10), transparent 35%),
                var(--bg);

            color:var(--text);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:1100px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:40px;
        }

        .brand{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .brand img{
            width:70px;
            height:70px;
            border-radius:18px;
            border:2px solid rgba(0,217,255,0.4);
            box-shadow:0 0 25px rgba(0,217,255,0.2);
        }

        .brand-text{
            font-family:'Orbitron',sans-serif;
            font-size:1.2rem;
            letter-spacing:2px;
        }

        h1{
            text-align:center;
            font-family:'Orbitron',sans-serif;
            font-size:3rem;
            margin-bottom:50px;
            color:#e6fbff;
            text-shadow:0 0 20px rgba(0,217,255,0.35);
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
            margin-bottom:40px;
        }

        .card{
            background:linear-gradient(180deg, rgba(10,20,35,0.92), rgba(5,10,18,0.98));
            border:1px solid var(--border);
            border-radius:24px;
            padding:35px 20px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.35);
        }

        .card-title{
            font-size:1rem;
            color:var(--muted);
            margin-bottom:20px;
            letter-spacing:1px;
        }

        .card-value{
            font-family:'Orbitron',sans-serif;
            font-size:3rem;
            color:var(--primary);
            text-shadow:0 0 20px rgba(0,217,255,0.4);
        }

        .buttons{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:18px;
            margin-top:20px;
        }

        .btn{
            text-decoration:none;
            padding:16px 28px;
            border-radius:14px;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:1px;
            transition:0.3s ease;
            font-size:0.85rem;
        }

        .btn-primary{
            background:linear-gradient(90deg,var(--primary),var(--primary-dark));
            color:#001018;
            box-shadow:0 10px 25px rgba(0,217,255,0.2);
        }

        .btn-secondary{
            border:1px solid rgba(255,255,255,0.1);
            color:#dffcff;
            background:rgba(255,255,255,0.03);
        }

        .btn:hover{
            transform:translateY(-3px);
        }

        .back-link{
            text-align:center;
            margin-top:35px;
        }

        .back-link a{
            color:var(--primary);
            text-decoration:none;
            font-size:0.9rem;
        }

        .footer{
            text-align:center;
            margin-top:40px;
            font-size:0.75rem;
            color:#475569;
        }

        @media(max-width:900px){

            h1{
                font-size:2rem;
            }

            .cards{
                grid-template-columns:1fr;
            }

            .topbar{
                flex-direction:column;
                gap:20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topbar">

            <div class="brand">
                <img src="logo1.jpg" alt="NBX Logo">
                <div class="brand-text">NBX PROTOCOL</div>
            </div>

        </div>

        <h1>Governance Dashboard</h1>

        <div class="cards">

            <div class="card">
                <div class="card-title">GOVERNANCE</div>
                <div class="card-value" id="governance">0</div>
            </div>

            <div class="card">
                <div class="card-title">ANALYTICS</div>
                <div class="card-value" id="analytics">0</div>
            </div>

            <div class="card">
                <div class="card-title">GROWTH</div>
                <div class="card-value" id="growth">0</div>
            </div>

        </div>

        <div class="buttons">

            <a href="https://nbx-governance-api.onrender.com/votes"
               class="btn btn-primary"
               target="_blank">
               API / VOTES DATA
            </a>

            <button class="btn btn-secondary" onclick="loadVotes()">
                Refresh Data
            </button>

        </div>

        <div class="back-link">
            <a href="index.html">← BACK TO NBX</a>
        </div>

        <div class="footer">
            © 2026 NBX PROTOCOL — GOVERNANCE SYSTEM
        </div>

    </div>

    <script>

        async function loadVotes(){

            try{

                const response = await fetch(
                    "https://nbx-governance-api.onrender.com/votes"
                );

                const data = await response.json();

                document.getElementById("governance").innerText =
                    data.GOVERNANCE || 0;

                document.getElementById("analytics").innerText =
                    data.ANALYTICS || 0;

                document.getElementById("growth").innerText =
                    data.GROWTH || 0;

            }catch(err){

                console.log("Errore caricamento voti:", err);

            }
        }

        loadVotes();

    </script>

</body>
</html>
