<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX | Governance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

        /* DASHBOARD HEADER */
        .dash-header {
            padding: 80px 5% 40px; text-align: center;
            background: linear-gradient(to bottom, #111 0%, #050505 100%);
            border-bottom: 1px solid var(--border);
        }
        .api-status {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0,255,0,0.05); padding: 5px 15px; border-radius: 20px;
            border: 1px solid rgba(0,255,0,0.2); color: #00ff00; font-size: 0.6rem; 
            font-weight: 900; font-family: 'Orbitron'; letter-spacing: 2px;
        }
        .pulse { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* PREMIUM PROGRESS BAR */
        .vote-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 40px; margin-bottom: 30px; transition: 0.3s;
        }
        .vote-card:hover { border-color: var(--gold); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        .bar-label { display: flex; justify-content: space-between; margin-bottom: 15px; font-family: 'Orbitron'; font-size: 0.8rem; }
        .bar-outer { 
            background: #000; height: 12px; border-radius: 50px; border: 1px solid #222; 
            overflow: hidden; position: relative; 
        }
        .bar-inner { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #8a6d1d, var(--gold)); 
            box-shadow: 0 0 15px var(--gold-glow);
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* INFRASTRUCTURE GRID */
        .infra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 50px; }
        .infra-item { 
            background: #0a0a0a; border: 1px solid #151515; padding: 20px; border-radius: 10px;
            font-size: 0.7rem; color: #555;
        }
        .infra-item b { color: var(--gold); display: block; margin-top: 5px; font-family: 'Orbitron'; }

        .back-btn {
            display: inline-block; margin-top: 40px; color: #444; text-decoration: none;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s;
        }
        .back-btn:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="dash-header">
        <div class="api-status"><span class="pulse"></span> CONNECTED TO RENDER NODE</div>
        <h1 style="font-family:'Orbitron'; letter-spacing:5px; margin: 20px 0 10px;">GOVERNANCE DASHBOARD</h1>
        <p style="color:#444; font-size:0.8rem; font-weight:700;">LIVE DAO MONITORING INTERFACE</p>
    </div>

    <div class="container">
        <div class="vote-card">
            <div class="bar-label">
                <span>TREASURY DISTRIBUTION</span>
                <span id="v1-perc" style="color:var(--gold)">0%</span>
            </div>
            <div class="bar-outer"><div id="v1-bar" class="bar-inner"></div></div>
            <p style="font-size:0.7rem; color:#444; margin-top:15px;">WEIGHT: <span id="v1-val" style="color:#888">0.00</span> WX</p>
        </div>

        <div class="vote-card">
            <div class="bar-label">
                <span>PROTOCOL UPGRADE NBX-04</span>
                <span id="v2-perc" style="color:var(--gold)">0%</span>
            </div>
            <div class="bar-outer"><div id="v2-bar" class="bar-inner"></div></div>
            <p style="font-size:0.7rem; color:#444; margin-top:15px;">WEIGHT: <span id="v2-val" style="color:#888">0.00</span> WX</p>
        </div>

        <div class="infra-grid">
            <div class="infra-item">TREASURY WALLET <b>3P4k...8s9W</b></div>
            <div class="infra-item">VOTING NODE <b>ACTIVE</b></div>
            <div class="infra-item">WAVES NETWORK <b>MAINNET</b></div>
        </div>

        <a href="index.html" class="back-btn">← RETURN TO CORE INTERFACE</a>
    </div>

    <script>
        async function loadVotes() {
            try {
                const r = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
                const data = await r.json();
                
                const v1 = parseFloat(data.GOVERNANCE || 0);
                const v2 = parseFloat(data.ANALYTICS || 0);

                const p1 = Math.min((v1 / 10).toFixed(1), 100);
                const p2 = Math.min((v2 / 5).toFixed(1), 100);

                document.getElementById('v1-bar').style.width = p1 + "%";
                document.getElementById('v1-perc').innerText = p1 + "%";
                document.getElementById('v1-val').innerText = v1.toFixed(2);

                document.getElementById('v2-bar').style.width = p2 + "%";
                document.getElementById('v2-perc').innerText = p2 + "%";
                document.getElementById('v2-val').innerText = v2.toFixed(2);
            } catch(e) { console.log("Node Sync Error"); }
        }

        loadVotes();
        setInterval(loadVotes, 15000); // Auto-refresh 15s
    </script>
</body>
</html>
