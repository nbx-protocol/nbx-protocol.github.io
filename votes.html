<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX | Real-Time Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --border: rgba(212, 175, 55, 0.15); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        .header { padding: 60px 5%; text-align: center; border-bottom: 1px solid var(--border); }
        .container { max-width: 800px; margin: 50px auto; padding: 0 20px; }
        
        .monitor-card { background: #0a0a0a; border: 1px solid var(--border); padding: 30px; border-radius: 8px; margin-bottom: 25px; }
        .label { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.7rem; color: #888; margin-bottom: 15px; }
        
        .bar-bg { background: #000; height: 6px; border-radius: 10px; border: 1px solid #111; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--gold); transition: width 2s ease-in-out; }
        
        .meta { margin-top: 15px; font-family: 'JetBrains Mono'; font-size: 0.65rem; color: #444; }
        .highlight { color: var(--gold); }

        .back { display: block; text-align: center; margin-top: 40px; color: #333; text-decoration: none; font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 2px; }
        .back:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-family:'Orbitron'; letter-spacing:8px; margin:0; font-size: 1.5rem;">SYSTEM MONITORING</h1>
    </div>

    <div class="container">
        <div class="monitor-card">
            <div class="label"><span>GOVERNANCE_WEIGHT_SYNC</span><span id="p1">0%</span></div>
            <div class="bar-bg"><div id="b1" class="bar-fill"></div></div>
            <div class="meta">BLOCKCHAIN DATA // WEIGHT: <span id="v1" class="highlight">0.00</span> WX</div>
        </div>

        <div class="monitor-card">
            <div class="label"><span>ANALYTICS_INDEX_STATUS</span><span id="p2">0%</span></div>
            <div class="bar-bg"><div id="b2" class="bar-fill"></div></div>
            <div class="meta">API ENDPOINT // WEIGHT: <span id="v2" class="highlight">0.00</span> WX</div>
        </div>
    </div>

    <a href="index.html" class="back">← EXIT MONITOR</a>

    <script>
        async function sync() {
            try {
                const r = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
                const d = await r.json();
                
                const g = parseFloat(d.GOVERNANCE || 0);
                const a = parseFloat(d.ANALYTICS || 0);

                const percG = Math.min((g / 1.0) * 100, 100).toFixed(1);
                const percA = Math.min((a / 1.0) * 100, 100).toFixed(1);

                document.getElementById('b1').style.width = percG + "%";
                document.getElementById('p1').innerText = percG + "%";
                document.getElementById('v1').innerText = g.toFixed(2);
                
                document.getElementById('b2').style.width = percA + "%";
                document.getElementById('p2').innerText = percA + "%";
                document.getElementById('v2').innerText = a.toFixed(2);
            } catch(e) {}
        }
        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
