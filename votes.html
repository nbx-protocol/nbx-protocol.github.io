<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX Governance - API Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --nbx-gold: #d4af37;
            --nbx-dark: #0a0a0a;
        }
        body { 
            background-color: var(--nbx-dark); 
            color: #ffffff; 
            font-family: monospace;
            padding: 20px;
        }
        .json-container {
            background-color: #141414;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            color: #00ff00; /* Stile terminale */
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .back-link {
            color: var(--nbx-gold);
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #ffffff;
            text-shadow: 0 0 5px var(--nbx-gold);
        }
        .title-gold { color: var(--nbx-gold); }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://nbx-protocol.github.io/nbx-site/index.html" class="back-link">
            ← BACK TO NBX
        </a>

        <h2 class="title-gold mb-4">RAW VOTING DATA (JSON)</h2>
        
        <div class="json-container">
            <pre id="raw-data">Caricamento dati blockchain...</pre>
        </div>

        <div class="mt-4 text-muted small">
            <p>Endpoint: <span class="text-info">https://nbx-governance-api.onrender.com/votes</span></p>
            <p>Status: <span id="status" class="text-success">CONNESSO</span></p>
        </div>
    </div>

    <script>
        async function fetchRawData() {
            const dataEl = document.getElementById('raw-data');
            const statusEl = document.getElementById('status');
            
            try {
                const response = await fetch('https://nbx-governance-api.onrender.com/votes');
                const data = await response.json();
                
                // Formatta il JSON per una lettura pulita
                dataEl.innerText = JSON.stringify(data, null, 4);
            } catch (error) {
                dataEl.innerText = "ERRORE: Impossibile recuperare i dati dal server Render.";
                dataEl.style.color = "#ff4444";
                statusEl.innerText = "OFFLINE";
                statusEl.className = "text-danger";
            }
        }

        // Esegui al caricamento
        fetchRawData();
    </script>
</body>
</html>
