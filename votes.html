<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBX | Governance Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0e0e0e; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px; box-sizing: border-box; }
        
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 80px; }
        header p { letter-spacing: 8px; color: #444; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        header h1 { font-family: 'Orbitron'; font-size: 3rem; color: var(--gold); margin: 0; }
        
        .live-status {
            display: inline-flex; align-items: center; background: rgba(0,255,0,0.05);
            padding: 8px 20px; border-radius: 50px; border: 1px solid rgba(0,255,0,0.1);
            margin-top: 25px; color: #00ff00; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
        }
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px #00ff00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* PROPOSAL CARDS */
        .vote-card {
            background: var(--card); border: 1px solid var(--border); padding: 50px;
            border-radius: 30px; margin-bottom: 35px; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .vote-card:hover { border-color: var(--gold); background: #121212; }
        
        .vote-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .vote-label h2 { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; margin: 0 0 10px 0; letter-spacing: 1px; }
        .vote-label span { color: #555; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }
        
        .perc-display { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; color: var(--gold); }

        /* DAO PROGRESS BARS */
        .bar-container { background: #000; height: 16px; border-radius: 8px; border: 1px solid #222; overflow: hidden; margin-bottom: 25px; }
        .bar-fill { 
            height: 100%; width: 0%; background: linear-gradient(90deg, #8a6d1d 0%, var(--gold) 100%); 
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .stats-row { display: flex; justify-content: space-between; padding-top: 20px; border-top: 1px solid #1a1a1a; }
        .stat-item { text-align: left; }
        .stat-item label { display: block; font-size: 0.65rem; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-item span { font-family: 'Orbitron'; font-size: 1rem; color: #bbb; }

        .back-link { display: block; text-align: center; margin-top: 60px; color: #555; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: var(--gold); }

        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .vote-card { padding: 30px; }
            .vote-info { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p>Governance Infrastructure</p>
        <h1>VOTING DASHBOARD</h1>
        <div class="live-status">
            <span class="dot"></span> LIVE PROTOCOL FEED
        </div>
    </header>

    <div class="vote-card">
        <div class="vote-info">
            <div class="vote-label">
                <span>Proposal NBX-001</span>
                <h2>TREASURY GOVERNANCE WEIGHT</h2>
            </div>
            <div class="perc-display" id="gov-perc">0.0%</div>
        </div>
        <div class="bar-container">
            <div class="bar-fill" id="gov-bar"></div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <label>Voted Amount</label>
                <span id="gov-val">0.00</span> <small style="color:var(--gold)">WX</small>
            </div>
            <div class="stat-item">
                <label>Quorum Target</label>
                <span>1000.00</span>
            </div>
            <div class="stat-item" style="text-align: right;">
                <label>Status</label>
                <span style="color: #00ff00;">Active</span>
            </div>
        </div>
    </div>

    <div class="vote-card">
        <div class="vote-info">
            <div class="vote-label">
                <span>Proposal NBX-002</span>
                <h2>ANALYTICS LAYER CONSENSUS</h2>
            </div>
            <div class="perc-display" id="ana-perc">0.0%</div>
        </div>
        <div class="bar-container">
            <div class="bar-fill" id="ana-bar"></div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <label>Voted Amount</label>
                <span id="ana-val">0.00</span> <small style="color:var(--gold)">WX</small>
            </div>
            <div class="stat-item">
                <label>Quorum Target</label>
                <span>500.00</span>
            </div>
            <div class="stat-item" style="text-align: right;">
                <label>Status</label>
                <span style="color: #00ff00;">Active</span>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-link">← BACK TO CORE INTERFACE</a>
</div>

<script>
    async function updateVotes() {
        try {
            const response = await fetch('https://nbx-governance-api.onrender.com/votes?t=' + Date.now());
            const data = await response.json();

            // Dati Reali
            const govVal = parseFloat(data.GOVERNANCE || 0);
            const anaVal = parseFloat(data.ANALYTICS || 0);

            // Calcolo percentuali fittizie basate su target realistici per visualizzare le barre
            const govP = Math.min((govVal / 10).toFixed(1), 100); 
            const anaP = Math.min((anaVal / 5).toFixed(1), 100);

            // Aggiornamento DOM
            document.getElementById('gov-val').innerText = govVal.toFixed(2);
            document.getElementById('gov-perc').innerText = govP + "%";
            document.getElementById('gov-bar').style.width = govP + "%";

            document.getElementById('ana-val').innerText = anaVal.toFixed(2);
            document.getElementById('ana-perc').innerText = anaP + "%";
            document.getElementById('ana-bar').style.width = anaP + "%";

            console.log("Sync complete:", new Date().toLocaleTimeString());
        } catch (e) {
            console.error("API Sync Offline");
        }
    }

    // Esegui subito e poi ogni 15 secondi
    updateVotes();
    setInterval(updateVotes, 15000);
</script>

</body>
</html>
