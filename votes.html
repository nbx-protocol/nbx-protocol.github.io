<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NBX Governance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{

    margin:0;

    background:#050505;

    color:white;

    font-family:'Inter',sans-serif;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

    overflow-x:hidden;
}

.container{

    width:100%;

    max-width:1100px;
}

.title{

    text-align:center;

    margin-bottom:60px;
}

.title h1{

    font-family:'Orbitron',sans-serif;

    font-size:3.5rem;

    margin-bottom:10px;
}

.title span{

    color:#d4af37;
}

.title p{

    color:#777;
}

.grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:25px;

    margin-bottom:50px;
}

.card{

    background:#0b0b0b;

    border:1px solid rgba(212,175,55,0.10);

    border-radius:24px;

    padding:40px;

    text-align:center;
}

.card h2{

    font-size:1rem;

    color:#888;

    margin-bottom:20px;
}

.value{

    font-family:'Orbitron',sans-serif;

    font-size:3rem;

    color:#d4af37;
}

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.btn{

    padding:18px 35px;

    border-radius:50px;

    text-decoration:none;

    font-weight:700;

    text-transform:uppercase;

    transition:0.3s;
}

.btn-primary{

    background:#d4af37;

    color:#000;
}

.btn-secondary{

    border:2px solid #333;

    color:#fff;
}

.btn:hover{

    transform:translateY(-3px);
}

@media(max-width:900px){

    .grid{

        grid-template-columns:1fr;
    }

    .title h1{

        font-size:2.5rem;
    }
}

</style>

</head>

<body>

<h1 style="color:red;font-size:80px;">
TEST 777
</h1>

<div class="container">

    <div class="title">

        <h1>
            NBX <span>Governance</span>
        </h1>

        <p>
            Live decentralized voting system
        </p>

    </div>

    <div class="grid">

        <div class="card">

            <h2>GOVERNANCE</h2>

            <div class="value" id="governance">
                0
            </div>

        </div>

        <div class="card">

            <h2>ANALYTICS</h2>

            <div class="value" id="analytics">
                0
            </div>

        </div>

        <div class="card">

            <h2>GROWTH</h2>

            <div class="value" id="growth">
                0
            </div>

        </div>

    </div>

    <div class="buttons">

        <a
            href="https://nbx-governance-api.onrender.com/votes"
            target="_blank"
            class="btn btn-primary">

            Open API
        </a>

        <a
            href="index.html"
            class="btn btn-secondary">

            Back To Home
        </a>

    </div>

</div>

<script>

async function loadVotes(){

    try{

        const response =
            await fetch(
                "https://nbx-governance-api.onrender.com/votes"
            );

        const data =
            await response.json();

        document.getElementById("governance").innerText =
            data.GOVERNANCE || 0;

        document.getElementById("analytics").innerText =
            data.ANALYTICS || 0;

        document.getElementById("growth").innerText =
            data.GROWTH || 0;

    }catch(err){

        console.log(err);
    }
}

loadVotes();

</script>

</body>
</html>
